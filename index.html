<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>how druunk ma'a?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
            color: #333;
        }
        .hidden {
            display: none;
        }
        #main-container {
            margin: 20px auto;
            width: 350px;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input {
            padding: 10px;
            width: 80%;
            font-size: 18px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #question-number {
            font-size: 14px;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>how druunk ma'a?</h1>
    
    <div id="main-container">
        <!-- Start Screen -->
        <div id="start-container">
            <p>Answer 10 math questions to find out how drunk you actually are. You won't see if you get them right until the end!</p>
            <button onclick="startTest()">Start Test</button>
        </div>

        <!-- Question Screen -->
        <div id="question-container" class="hidden">
            <h2 id="question-text"></h2>
            <input type="number" id="answer-input" placeholder="Your answer..." onkeypress="handleKeyPress(event)">
            <br>
            <button onclick="submitAnswer()">Next</button>
            <p id="question-number">Question <span id="q-num-display">1</span> / 10</p>
        </div>

        <!-- Result Screen -->
        <div id="result-container" class="hidden">
            <h2>Test Complete!</h2>
            <p>Your Score: <strong style="font-size: 24px;"><span id="score-text"></span> / 10</strong></p>
            <h3 id="drunk-level-text" style="color: #d9534f; margin-top: 20px;"></h3>
            <br>
            <button onclick="location.reload()">Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
